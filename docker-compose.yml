      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - N8N_INTERNAL_URL=${N8N_INTERNAL_URL:-http://n8n:5678}
      - N8N_INGEST_WEBHOOK=${N8N_INGEST_WEBHOOK:-}
      - RAG_WEBHOOK_URL=${RAG_WEBHOOK_URL:-}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
