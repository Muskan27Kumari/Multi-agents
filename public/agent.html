<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent — VGI Agent Universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .crumbs {
      padding-top: 36px;
      color: var(--text-dim);
      font-size: 14px;
      display: flex; gap: 8px; align-items: center;
    }
    .crumbs a { color: var(--text-muted); transition: color 160ms;}
    .crumbs a:hover { color: var(--text); }

    .detail-hero {
      padding: 36px 0 56px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
    }
    @media (min-width: 980px) {
      .detail-hero { grid-template-columns: 1.4fr 1fr; gap: 64px; padding: 56px 0 80px;}
    }
    .d-head { display: flex; gap: 22px; align-items: flex-start; }
    .d-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: var(--grad-soft);
      border: 1px solid rgba(139,92,246,0.34);
      display: grid; place-items: center;
      color: #c7bcff;
      flex: 0 0 auto;
      box-shadow: 0 16px 40px -16px rgba(139,92,246,0.6);
    }
    .d-icon svg { width: 32px; height: 32px; }
    .d-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .d-title {
      font-size: clamp(36px, 5.4vw, 64px);
      letter-spacing: -0.03em;
      line-height: 1.02;
    }
    .d-tagline {
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1.55;
      margin-top: 22px;
      max-width: 620px;
    }
    .d-ctas { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 32px; }

    /* Right column: request card */
    .req-card {
      position: sticky;
      top: 96px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.005) 100%),
        var(--bg-elev-2);
      border: 1px solid var(--border-strong);
      border-radius: 24px;
      padding: 28px;
    }
    .req-card h4 {
      font-size: 18px;
      margin-bottom: 6px;
    }
    .req-card p { color: var(--text-muted); font-size: 14px; line-height: 1.55; }
    .req-list { margin: 22px 0 24px; display: flex; flex-direction: column; gap: 12px; }
    .req-list li {
      display: flex; gap: 10px; align-items: flex-start;
      color: var(--text-muted);
      font-size: 14px;
      list-style: none;
    }
    .req-list li svg {
      width: 18px; height: 18px;
      color: var(--mint);
      flex: 0 0 auto;
      margin-top: 1px;
    }
    .req-card .btn-grad { width: 100%; justify-content: center; }

    /* Body sections */
    .d-body {
      display: grid;
      grid-template-columns: 1fr;
      gap: 64px;
      padding-bottom: 80px;
    }
    @media (min-width: 980px) { .d-body { grid-template-columns: 1.4fr 1fr; gap: 64px; } }

    .block { }
    .block h2 {
      font-size: 28px;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }
    .block h2 .num {
      display: inline-block;
      font-family: "DM Sans", sans-serif;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-right: 12px;
    }
    .long-desc {
      color: var(--text-muted);
      font-size: 16.5px;
      line-height: 1.7;
      max-width: 620px;
    }
    .features {
      display: flex; flex-direction: column; gap: 16px;
    }
    .feature {
      display: flex; gap: 14px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,0.015);
      transition: border-color 200ms, background 200ms;
    }
    .feature:hover {
      border-color: var(--border-strong);
      background: rgba(255,255,255,0.03);
    }
    .feature .check {
      width: 28px; height: 28px;
      border-radius: 999px;
      background: var(--grad-soft);
      border: 1px solid rgba(139,92,246,0.4);
      color: #c7bcff;
      display: grid; place-items: center;
      flex: 0 0 auto;
    }
    .feature .check svg { width: 14px; height: 14px; }
    .feature p {
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    .stack-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .stack-pill {
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.025);
      display: flex; align-items: center; gap: 12px;
      transition: all 200ms;
    }
    .stack-pill:hover { border-color: var(--border-strong); transform: translateY(-2px); }
    .stack-pill .stack-dot {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--grad);
      flex: 0 0 auto;
      box-shadow: 0 4px 14px -4px rgba(139,92,246,0.5);
    }
    .stack-pill span { font-size: 14.5px; font-weight: 500; }

    .related-head { margin-bottom: 24px; display:flex; justify-content:space-between; align-items:end; }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: 18px;
    }

    /* Sidebar quick facts */
    .qfacts {
      list-style: none; padding: 0; margin: 24px 0;
      display: flex; flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .qfacts li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px;
      font-size: 13.5px;
    }
    .qfacts li:not(:last-child) { border-bottom: 1px solid var(--border); }
    .qfacts li span:first-child { color: var(--text-dim); }
    .qfacts li span:last-child { color: var(--text); font-weight: 500; }
  </style>
</head>
<body data-screen-label="Agent detail">
  <div data-shell="nav"></div>

  <main id="main"></main>

  <div data-shell="footer"></div>

  <!-- JavaScript files reorganized into Constants, Utilities, and Components modules -->
  <script src="js/constants/agents.js"></script>
  <script src="js/utils/icons.js"></script>
  <script src="js/utils/reveal.js"></script>
  <script src="js/utils/spotlight.js"></script>
  <script src="js/components/navigation.js"></script>
  <script src="js/components/footer.js"></script>
  <script src="js/components/agent-card.js"></script>
  <script src="js/components/request-modal.js"></script>
  <script src="js/main.js"></script>

  <script>
    mountShell('agents');

    // Get id from URL, fall back to first agent
    const id = new URLSearchParams(location.search).get('id') || AGENTS[0].id;
    const a = AGENTS.find(x => x.id === id) || AGENTS[0];
    document.title = `${a.name} — VGI Agent Universe`;

    const statusClass = a.status === 'Available' ? 'status-available' : 'status-soon';
    const related = AGENTS.filter(x => x.id !== a.id && x.category === a.category).slice(0, 3);
    const fillerRelated = AGENTS.filter(x => x.id !== a.id && !related.find(r => r.id === x.id)).slice(0, 3 - related.length);
    const relatedFinal = [...related, ...fillerRelated];

    document.getElementById('main').innerHTML = `
      <div class="container">
        <div class="crumbs">
          <a href="index.html">Home</a>
          <span>${ICON('arrow', 12)}</span>
          <a href="agents.html">Agents</a>
          <span>${ICON('arrow', 12)}</span>
          <span style="color: var(--text);">${a.name}</span>
        </div>

        <section class="detail-hero">
          <div class="reveal">
            <div class="d-head">
              <div class="d-icon">${ICON(a.icon, 32)}</div>
              <div>
                <div class="d-meta">
                  <span class="badge badge-grad">${a.category}</span>
                  <span class="badge ${statusClass}"><span class="badge-dot"></span>${a.status}</span>
                </div>
                <h1 class="d-title">${a.name}</h1>
              </div>
            </div>
            <p class="d-tagline">${a.short}</p>
            <div class="d-ctas">
              <button class="btn btn-grad" type="button" data-request="${a.id}">
                Request this agent ${ICON('arrow', 16)}
              </button>
              <a class="btn btn-ghost" href="agents.html">Back to catalogue</a>
            </div>
          </div>

          <aside class="reveal">
            <div class="req-card">
              <h4>What you get</h4>
              <p>Deployment, integrations, and the first 30 days of tuning included with every agent request.</p>
              <ul class="req-list">
                <li>${ICON('check', 18)} Discovery call within 24 hours</li>
                <li>${ICON('check', 18)} Pilot deployment in 2 weeks</li>
                <li>${ICON('check', 18)} Dashboard with usage + accuracy metrics</li>
                <li>${ICON('check', 18)} Slack channel with the build team</li>
              </ul>
              <button class="btn btn-grad" type="button" data-request="${a.id}">
                Request ${a.name.split(' ')[0]} ${ICON('arrow', 16)}
              </button>
              <ul class="qfacts">
                <li><span>Category</span><span>${a.category}</span></li>
                <li><span>Availability</span><span>${a.status}</span></li>
                <li><span>Setup time</span><span>${a.status === 'Available' ? '2 weeks' : 'Q3 2026'}</span></li>
                <li><span>Engagement</span><span>Pilot → Production</span></li>
              </ul>
            </div>
          </aside>
        </section>

        <section class="d-body">
          <div>
            <div class="block reveal" style="margin-bottom: 64px;">
              <h2><span class="num">01</span> Overview</h2>
              <p class="long-desc">${a.long}</p>
            </div>

            <div class="block reveal" style="margin-bottom: 64px;">
              <h2><span class="num">02</span> What it does</h2>
              <div class="features">
                ${a.features.map(f => `
                  <div class="feature">
                    <div class="check">${ICON('check', 14)}</div>
                    <p>${f}</p>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="block reveal">
              <h2><span class="num">03</span> Built on</h2>
              <div class="stack-grid">
                ${a.stack.map(s => `
                  <div class="stack-pill"><span class="stack-dot"></span><span>${s}</span></div>
                `).join('')}
              </div>
            </div>
          </div>

          <aside></aside>
        </section>

        <section class="reveal" style="padding: 0 0 100px;">
          <div class="related-head">
            <div>
              <div class="eyebrow">More agents</div>
              <h2 style="font-size: clamp(28px, 3.4vw, 40px); letter-spacing: -0.02em;">You might also like</h2>
            </div>
            <a class="btn btn-ghost btn-sm" href="agents.html">All agents ${ICON('arrow', 14)}</a>
          </div>
          <div class="related-grid">
            ${relatedFinal.map(renderAgentCard).join('')}
          </div>
        </section>
      </div>
    `;

    initReveal();
    initCardSpotlight();
  </script>
</body>
</html>
